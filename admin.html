<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 数字文旅驾驶舱</title>
    <link rel="stylesheet" href="admin-style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>数字文旅驾驶舱</h3>
            </div>
            <div class="sidebar-nav">
                <div class="nav-item">
                    <a href="dashboard.html">专题看板</a>
                </div>
                <div class="nav-item active">
                    <a href="admin.html">核心指标管理</a>
                </div>
                <div class="nav-item">
                    <a href="ip-management.html">IP效能管理</a>
                </div>
                <div class="nav-item">
                    <a href="cultural-products-management.html">文创产品管理</a>
                </div>
                <div class="nav-item">
                    <a href="cultural-relics-management.html">重点文物管理</a>
                </div>
                <div class="nav-item">
                    <a href="smart-business-management.html">智慧商圈管理</a>
                </div>
                <div class="nav-item">
                    <a href="visitor-management.html">客流统计管理</a>
                </div>
                <div class="nav-item">
                    <a href="consumption-management.html">消费分析管理</a>
                </div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 顶部导航栏 -->
            <div class="top-nav">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <h2>核心指标管理</h2>
                    <a href="index.html" class="btn btn-primary">查看驾驶舱</a>
                </div>
                <div class="user-info">
                    <span>管理员</span>
                    <button class="logout-btn">登出</button>
                </div>
            </div>
            
            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 核心指标卡片 -->
                <div class="card">
                    <div class="card-header">
                        <h3>核心指标</h3>
                        <button class="btn btn-primary" data-modal="addMetricModal">添加指标</button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>指标名称</th>
                                <th>指标值</th>
                                <th>所属模块</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>核心IP数</td>
                                <td>15</td>
                                <td>数字文化</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="action-btn btn-success" data-modal="editMetricModal">编辑</button>
                                        <button class="action-btn btn-danger">删除</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>重点文物数</td>
                                <td>89</td>
                                <td>数字文化</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="action-btn btn-success" data-modal="editMetricModal">编辑</button>
                                        <button class="action-btn btn-danger">删除</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>日均人数</td>
                                <td>1.28万</td>
                                <td>数字旅游</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="action-btn btn-success" data-modal="editMetricModal">编辑</button>
                                        <button class="action-btn btn-danger">删除</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>文创产品数</td>
                                <td>98个</td>
                                <td>数字旅游</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="action-btn btn-success" data-modal="editMetricModal">编辑</button>
                                        <button class="action-btn btn-danger">删除</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加指标模态框 -->
    <div class="modal" id="addMetricModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加核心指标</h3>
                <button class="close-btn">&times;</button>
            </div>
            <form>
                <div class="form-group">
                    <label for="metricName">指标名称</label>
                    <input type="text" id="metricName" name="metricName" required placeholder="请输入指标名称">
                </div>
                <div class="form-group">
                    <label for="metricValue">指标值</label>
                    <input type="text" id="metricValue" name="metricValue" required placeholder="请输入指标值">
                </div>
                <div class="form-group">
                    <label for="metricModule">所属模块</label>
                    <select id="metricModule" name="metricModule" required>
                        <option value="数字文化">数字文化</option>
                        <option value="数字旅游">数字旅游</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-btn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 编辑指标模态框 -->
    <div class="modal" id="editMetricModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑核心指标</h3>
                <button class="close-btn">&times;</button>
            </div>
            <form>
                <div class="form-group">
                    <label for="editMetricName">指标名称</label>
                    <input type="text" id="editMetricName" name="editMetricName" required value="核心IP数">
                </div>
                <div class="form-group">
                    <label for="editMetricValue">指标值</label>
                    <input type="text" id="editMetricValue" name="editMetricValue" required value="15">
                </div>
                <div class="form-group">
                    <label for="editMetricModule">所属模块</label>
                    <select id="editMetricModule" name="editMetricModule" required>
                        <option value="数字文化" selected>数字文化</option>
                        <option value="数字旅游">数字旅游</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-btn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="admin-script.js"></script>
</body>
</html>
